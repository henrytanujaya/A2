# ─── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8321}
  shutdown: graceful

# ─── Spring ──────────────────────────────────────────────────────────────────
spring:
  application:
    name: ecommerce-backend

  lifecycle:
    timeout-per-shutdown-phase: 30s

  # ─── Datasource ────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=OtakuECommerce;encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 2

  # ─── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      # AMAN: "validate" hanya cek skema — tidak DROP/CREATE tabel
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

  # ─── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true
    validate-on-migrate: false

  # ─── Session Management (Redis) ────────────────────────────────────────────
  session:
    store-type: redis
    redis:
      namespace: spring:session

  # ─── Redis — Token Blacklist ────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      connect-timeout: 3000ms

  # ─── Multipart Upload ──────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ─── JWT Configuration ───────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:OtakuEcommerceBlueprintSecretKey2026ChangeThisInProduction!!}
  access-token-expiration: 900000      # 15 menit
  refresh-token-expiration: 604800000  # 7 hari

# ─── File Storage (Local) ────────────────────────────────────────────────────
storage:
  upload-dir: uploads
  outfit-dir: ${storage.upload-dir}/outfits
  figure-dir: ${storage.upload-dir}/figures

# ─── BinderByte Tracking API (untuk TrackingService) ────────────────────────
binderbyte:
  api-key: ${BINDERBYTE_API_KEY:f3f50808a3d132b354dfa4ebf2c5d1752bca7e025f187a51206bd4199c4bd9cc}
  base-url: https://api.binderbyte.com/v1
